<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paola Machine</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <main>
        <h1>Paola's Machine</h1>

        <section>
            <select id="select_base">
                <option value="#">Selecione uma base...</option>
                <option value="10">Decimal</option>
                <option value="8">Octal</option>
                <option value="16">Hexadecimal</option>
                <option value="2">Binário</option>
            </select>

            <p>Digite um número:</p>
            <input id="ipt_numero" type="text" placeholder="Ex: 42">

            <button onclick="converter()">Converter</button>

            <div id="div_resultados">
                <p>Decimal: <span id="res_dec"></span></p>
                <p>Binário: <span id="res_bin"></span></p>
                <p>Octal: <span id="res_oct"></span></p>
                <p>Hexa: <span id="res_hexa"></span></p>
            </div>
        </section>
    </main>
</body>
</body>

</html>
